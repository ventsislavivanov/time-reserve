<div class="container mt-4 pb-5">
  <div class="row">
    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
          <h5 class="mb-0">{{ isEditing() ? 'Edit' : 'Add new' }}</h5>
        </div>
        <div class="card-body">
          <form [formGroup]="categoryForm" (ngSubmit)="onSubmit()">

            <form-field
              label="Name"
              name="name"
              [errors]="nameErrors"
            >
              <input
                formControlName="name"
                type="text"
                class="form-control"
                [class.is-invalid]="nameErrors.length > 0"
                [class.is-valid]="categoryForm.get('name')?.valid &&
                            categoryForm.get('name')?.touched &&
                            categoryForm.get('name')?.value"
              />
            </form-field>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-success w-100" [disabled]="categoryForm.invalid">
                {{ isEditing() ? 'Save' : 'Create' }}
              </button>

              @if(isEditing()) {
                <button type="button" class="btn btn-secondary" (click)="resetForm()">
                  Cancel
                </button>
              }
            </div>
          </form>
        </div>
      </div>
    </div>

    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
          <h5 class="mb-0">List categories</h5>
          @if(isLoading()) {
            <span class="spinner-border spinner-border-sm text-primary"></span>
          }
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
              <tr>
                <th>Name</th>
                <th class="text-end pe-4">Action</th>
              </tr>
              </thead>
              <tbody>
                @for (category of categories(); track category.id) {
                  <tr>
                    <td class="fw-bold">{{ category.name }}</td>
                    <td class="text-end pe-3">
                      <button class="btn btn-sm btn-outline-warning me-2" (click)="onEdit(category)">
                        <fa-icon [icon]="faEdit"></fa-icon>
                      </button>
                      <button class="btn btn-sm btn-outline-danger" (click)="onDelete(category.id)">
                        <fa-icon [icon]="faTrash"></fa-icon>
                      </button>
                    </td>
                  </tr>
                }

                @if(categories().length === 0 && !isLoading()) {
                  <tr>
                    <td colspan="2" class="text-center py-4 text-muted">
                      No data.
                    </td>
                  </tr>
                }
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
